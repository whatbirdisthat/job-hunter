<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clip this job</title>
  <style>
    body { font: 14px system-ui, sans-serif; margin: 0; padding: 12px; width: 240px; }
    button { width: 100%; padding: 8px 12px; font: inherit; cursor: pointer; }
    #status { margin-top: 8px; min-height: 1.2em; color: #444; }
  </style>
</head>
<body>
  <button id="clip" type="button" aria-label="Clip the job on the current tab">
    Clip this job
  </button>
  <p id="status" role="status" aria-live="polite"></p>
  <script type="module" src="popup.mjs"></script>
</body>
</html>
