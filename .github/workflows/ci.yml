name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # PII firewall — the most important gate for a PUBLIC repo. Structural rules
  # (not real identifiers) so this file never itself contains PII:
  #   * every email-shaped token must use a reserved example domain
  #   * no private-key material may be committed
  # ───────────────────────────────────────────────────────────────────────────
  pii-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Emails must use reserved example domains only
        run: |
          bad=$(git ls-files -z | xargs -0 grep -rhoiE '[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}' 2>/dev/null \
                | sort -u | grep -viE '@example\.(com|org|net)$|@job-hunter\.example$' || true)
          if [ -n "$bad" ]; then
            echo "::error::Non-example email address found in tracked files (possible PII):"
            echo "$bad"
            exit 1
          fi
          echo "OK: all email tokens use reserved example domains."
      - name: No private keys committed
        run: |
          if git ls-files -z | xargs -0 grep -lE 'BEGIN (RSA|OPENSSH|EC|DSA|PGP)? ?PRIVATE KEY' 2>/dev/null; then
            echo "::error::Private key material found in tracked files."
            exit 1
          fi
          echo "OK: no private-key material."

  # ───────────────────────────────────────────────────────────────────────────
  # Foundation checks: synthetic data is deterministic, valid, and renders.
  # ───────────────────────────────────────────────────────────────────────────
  foundation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: typst-community/setup-typst@v4

      - name: Fixtures are deterministic (same seed → identical output)
        run: |
          node tools/fake-data/generate.js --seed 42 --personas 4 --jobs 6 --out /tmp/fx
          diff -rq fixtures/personas /tmp/fx/personas
          diff -rq fixtures/jobs /tmp/fx/jobs
          echo "OK: regeneration is byte-identical to committed fixtures."

      - name: Fixtures validate against the master-CV schema
        run: node tools/fake-data/validate.js fixtures/personas/*.cv.json

      - name: CV renders to PDF (smoke test)
        run: |
          typst compile templates/cv/classic.typ /tmp/sample-cv.pdf \
            --input data=fixtures/personas/persona-001.cv.json --root .
          test -s /tmp/sample-cv.pdf && echo "OK: PDF rendered."

      - name: Compact CV renders to PDF (smoke test)
        run: |
          typst compile templates/cv/compact.typ /tmp/sample-compact.pdf \
            --input data=fixtures/personas/persona-001.cv.json --root .
          test -s /tmp/sample-compact.pdf && echo "OK: compact PDF rendered."

      - name: Upload sample CV PDF
        uses: actions/upload-artifact@v4
        with:
          name: sample-cv
          path: /tmp/sample-cv.pdf

  # ───────────────────────────────────────────────────────────────────────────
  # Rust workspace gate (slice 1 + item #2): the deterministic tailoring engine +
  # command layer + the résumé-import crate (crates/cvimport). Gate order: fmt →
  # clippy -D warnings → test L1–L5 → coverage floor. The cvimport crate rides this
  # gate automatically as a `[workspace].members` entry — `cargo test/clippy/llvm-cov
  # --workspace` pick it up; its L3/L5 tests reuse the `node` validator and the
  # `typst` CLI already installed below (no new tooling). Render uses the CLI typst
  # path (typst-community/setup-typst); the embedded §H path is behind the
  # `embedded-typst` feature (deferred — see doc/COVERAGE.md / DISCUSS-RENDER). The
  # `foundation` CV render smoke stays green unchanged.
  # ───────────────────────────────────────────────────────────────────────────
  rust-workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - uses: typst-community/setup-typst@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install Liberation fonts (CLI render parity with bundled faces)
        run: sudo apt-get update && sudo apt-get install -y fonts-liberation
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # 1. fmt
      - name: cargo fmt --check
        run: cargo fmt --all --check

      # 2. clippy (deny warnings)
      - name: cargo clippy --all-targets -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      # 3-7. L1 unit · L2 module · L3 boundary · L4 system · L5 STORY (perf-delta)
      #      all run under cargo test --workspace; L3 reuses tools/fake-data/validate.js
      #      to assert the tailored view conforms to master-cv.schema.json.
      - name: cargo test --workspace (L1–L5)
        run: cargo test --workspace --all-targets

      # Coverage floor: 100% of reachable code. Documented pragmas (doc/COVERAGE.md)
      # are the only lines below; we enforce a high line floor so a regression that
      # drops a covered path fails the gate.
      - name: coverage floor (cargo llvm-cov)
        run: |
          cargo llvm-cov --workspace --all-targets \
            --ignore-filename-regex 'crates/cli/' \
            --summary-only --fail-under-lines 99

  # ───────────────────────────────────────────────────────────────────────────
  # Capture-core gate (item #4): the TypeScript acquisition surface — the MV3
  # "clip this job" extension + the saved-search email parser. The deterministic
  # DOM→job and email→job logic lives as PURE .mjs cores in packages/capture-core
  # (ported §F from crates/jobparse), with the extension wiring kept thin.
  #
  # BLOCKING and honest: this job needs NO `npm install`. The cores carry ZERO
  # runtime/dev npm dependencies and run on Node's built-in test runner + built-in
  # coverage — so unlike the `ui` job (issue #2), it can actually run on these
  # registry-less runners and gate. L1 unit · L2 module · L3 boundary (output
  # validates against normalized-job.schema.json) · L4 system (manifest validity +
  # content-script smoke) · L5 STORY (clip→json + email→jobs, perf-delta gated).
  # 100%-of-reachable coverage floor on the pure cores.
  # ───────────────────────────────────────────────────────────────────────────
  capture-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # node 24 ships the built-in test runner + --experimental-test-coverage;
          # NO registry access is needed (no `npm install`/`npm ci` step at all).
          node-version: '24'
      # L1–L5. Glob form (not bare dir positionals) — node 24's --test rejects a
      # directory import (ERR_UNSUPPORTED_DIR_IMPORT); explicit *.test.mjs globs run.
      - name: node --test (L1–L5, capture-core + extension) with coverage floor
        run: |
          node --test --experimental-test-coverage \
            'packages/capture-core/test/*.test.mjs' \
            'extension/test/*.test.mjs' 2>&1 | tee /tmp/capture-test.log
          # 100%-of-reachable floor on the pure cores: parse the per-file coverage
          # table and fail if ANY *.mjs row's LINE-% column (the first numeric
          # column) is below 100. Anchored on column 1 so the branch/func columns
          # cannot mask a line-coverage regression (the cores have no pragmas).
          if awk -F'|' '/\.mjs +\|/ { gsub(/[^0-9.]/,"",$2); if ($2+0 < 100) { print "BELOW FLOOR:" $0; bad=1 } } END { exit bad }' /tmp/capture-test.log; then
            echo "OK: capture-core L1–L5 green, 100% line coverage on the cores."
          else
            echo "::error::capture-core line coverage below the 100%-of-reachable floor."
            exit 1
          fi
      - name: normalized-job CLI validator self-check (zero-dep)
        run: |
          node -e "import('./packages/capture-core/src/index.mjs').then(m=>{const fs=require('fs');const j=m.extractFromHtml(fs.readFileSync('packages/capture-core/fixtures/linkedin-job.html','utf8'));fs.writeFileSync('/tmp/clip.json',m.toJson(j))})"
          node tools/fake-data/validate-job.js /tmp/clip.json

  # ───────────────────────────────────────────────────────────────────────────
  # UI gate (slice 1): the React review-UI approve/reject component test (R-D3,
  # RTL + user-event). Full WebDriver E2E is deferred; the end-to-end journey is
  # proven by the Rust command-level STORY (L5) in the rust-workspace job.
  # ───────────────────────────────────────────────────────────────────────────
  # BLOCKING. The earlier failure (issue #2) was NOT registry-unreachability — the
  # committed apps/desktop/package-lock.json pins tarball URLs to the internal
  # npm.local host, and `npm ci` follows those lockfile URLs directly (ignoring
  # --registry). apps/desktop/.npmrc sets `replace-registry-host=always`, which
  # rewrites that host to the active registry at install time, so `npm ci` is
  # portable across runners. (Fix diagnosed by GitHub Copilot in PR #8.)
  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - run: npm ci
      - name: vitest (review-UI component test)
        run: npm test
